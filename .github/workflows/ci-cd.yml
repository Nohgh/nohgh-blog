name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 테스트 실행
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Node.js 설정
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 의존성 설치
        run: pnpm install

      - name: 린트 실행
        run: pnpm lint

      - name: 타입 체크
        run: pnpm type-check

      - name: 테스트 실행
        run: pnpm test

      - name: 테스트 커버리지 업로드 (선택사항)
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  deploy:
    name: Vercel 배포
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Vercel CLI 설치
        run: npm install -g vercel@latest

      - name: Vercel 프로젝트 설정 가져오기
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 빌드 및 배포
        run: vercel --token=${{ secrets.VERCEL_TOKEN }} --prod
