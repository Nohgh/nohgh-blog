name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 테스트 실행
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Node.js 설정
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'pnpm'

      - name: pnpm 활성화
        run: corepack enable

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 린트
        run: pnpm lint

      - name: 타입 체크
        run: pnpm type:check

      # - name: 테스트
      #   run: pnpm test

  deploy:
    name: Vercel 배포
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Vercel 배포
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
